<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteringshatten</title>
<style>
  :root {
    --yellow: #f4c430;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #3498db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.6s ease;
  }
  #app {
    width: 100%;
    max-width: 600px;
    padding: 24px;
    text-align: center;
  }
  h1 { font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 0.5em; }
  .hat { font-size: clamp(4rem, 20vw, 8rem); margin-bottom: 0.2em; }
  .subtitle { opacity: 0.8; margin-bottom: 2em; font-size: 1.1rem; }
  button {
    font: inherit;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 1.1rem;
    background: #fff;
    color: #1a1a2e;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .btn-big { font-size: 1.4rem; padding: 20px 40px; }
  .question { margin-bottom: 1.5em; }
  .question h2 { font-size: 1.4rem; margin-bottom: 1em; line-height: 1.3; }
  .options { display: grid; gap: 12px; }
  .options button { width: 100%; text-align: left; }
  .progress { opacity: 0.6; margin-bottom: 1.5em; letter-spacing: 0.3em; }
  .result-team { font-size: clamp(2.5rem, 12vw, 5rem); font-weight: 800; text-transform: uppercase; margin: 0.2em 0; }
  .spots-left { font-size: 1.2rem; opacity: 0.9; margin-top: 1em; }
  .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 2em 0; }
  .team-card { padding: 16px; border-radius: 12px; font-weight: 700; }
  .team-card small { display: block; font-weight: 400; opacity: 0.85; margin-top: 4px; }
  .bg-yellow { background: var(--yellow); color: #1a1a2e; }
  .bg-green  { background: var(--green); }
  .bg-red    { background: var(--red); }
  .bg-blue   { background: var(--blue); }
  body.theme-yellow { background: var(--yellow); color: #1a1a2e; }
  body.theme-green  { background: var(--green); }
  body.theme-red    { background: var(--red); }
  body.theme-blue   { background: var(--blue); }
  body.theme-yellow button, body.theme-green button, body.theme-red button, body.theme-blue button { background: #1a1a2e; color: #fff; }
  .reset-link {
    position: fixed; bottom: 12px; right: 16px;
    font-size: 0.8rem; opacity: 0.4; cursor: pointer; user-select: none;
  }
  .full-note { opacity: 0.7; font-style: italic; margin-top: 1em; }
  @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .pop { animation: pop 0.5s ease; }
</style>
</head>
<body>
<div id="app"></div>
<div class="reset-link" id="resetLink" title="Värd-nollställning">nollställ</div>

<script>
const TEAMS = ['yellow', 'green', 'red', 'blue'];
const TEAM_LABELS = { yellow: 'Lag Gul', green: 'Lag Grön', red: 'Lag Röd', blue: 'Lag Blå' };
const TEAM_COLOR = { yellow: 'gult', green: 'grönt', red: 'rött', blue: 'blått' };
const CAP = 8;
const STORAGE_KEY = 'sortingHatSpots';

// Each option carries weight toward teams.
const QUESTIONS = [
  {
    q: 'Ananas på pizza?',
    options: [
      { text: 'Självklart ja', w: { yellow: 2 } },
      { text: 'Absolut inte', w: { red: 2 } },
      { text: 'Bara på tisdagar', w: { green: 2 } },
      { text: 'Pizza är en lögn', w: { blue: 2 } },
    ],
  },
  {
    q: 'Välj ett ljud.',
    options: [
      { text: 'Boop', w: { blue: 2 } },
      { text: 'Tut', w: { yellow: 2 } },
      { text: 'Vrrrrrm', w: { red: 2 } },
      { text: 'Total tystnad', w: { green: 2 } },
    ],
  },
  {
    q: 'En trollkarl förvandlar dig till en köksapparat. Vilken?',
    options: [
      { text: 'Skrikande vattenkokare', w: { red: 2 } },
      { text: 'Självgod brödrost', w: { yellow: 2 } },
      { text: 'Dyster kyl', w: { blue: 2 } },
      { text: 'Kaotisk mixer', w: { green: 2 } },
    ],
  },
  {
    q: 'En gås närmar sig. Vad gör du?',
    options: [
      { text: 'Bli vän med den', w: { yellow: 2 } },
      { text: 'Spring iväg', w: { blue: 2 } },
      { text: 'Tuta tillbaka', w: { red: 2 } },
      { text: 'Bjud på te', w: { green: 2 } },
    ],
  },
  {
    q: 'Välj ett förbjudet mellanmål.',
    options: [
      { text: 'En enda lysande druva', w: { green: 2 } },
      { text: 'Soppa, fast krispig', w: { red: 2 } },
      { text: 'Isbit från 1997', w: { blue: 2 } },
      { text: 'Starkt kryddat moln', w: { yellow: 2 } },
    ],
  },
];

let spots = loadSpots();
let answers = [];

function loadSpots() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (TEAMS.every(t => typeof parsed[t] === 'number')) return parsed;
    }
  } catch (e) { /* fall through */ }
  return { yellow: CAP, green: CAP, red: CAP, blue: CAP };
}

function saveSpots() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(spots));
}

function resetSpots() {
  spots = { yellow: CAP, green: CAP, red: CAP, blue: CAP };
  saveSpots();
}

const app = document.getElementById('app');

function setTheme(team) {
  document.body.className = team ? 'theme-' + team : '';
}

function totalLeft() {
  return TEAMS.reduce((s, t) => s + spots[t], 0);
}

function renderStart() {
  setTheme(null);
  answers = [];
  app.innerHTML = `
    <div class="hat">🎩</div>
    <h1>Sorteringshatten</h1>
    <p class="subtitle">Svara på 5 frågor. Möt ditt öde.</p>
    <div class="team-grid">
      ${TEAMS.map(t => `
        <div class="team-card bg-${t}">
          ${TEAM_LABELS[t]}
          <small>${spots[t]} av ${CAP} platser kvar</small>
        </div>`).join('')}
    </div>
    ${totalLeft() === 0
      ? `<p class="full-note">Festen är full — alla lag är fulla och snart är personerna det också!</p>`
      : `<button class="btn-big" id="startBtn">Sätt på hatten</button>`}
  `;
  const btn = document.getElementById('startBtn');
  if (btn) btn.onclick = () => renderQuestion(0);
}

function renderQuestion(i) {
  setTheme(null);
  const Q = QUESTIONS[i];
  app.innerHTML = `
    <div class="progress">${'● '.repeat(i + 1).trim()}${' ○'.repeat(QUESTIONS.length - i - 1)}</div>
    <div class="question pop">
      <h2>${Q.q}</h2>
      <div class="options">
        ${Q.options.map((o, idx) => `<button data-idx="${idx}">${o.text}</button>`).join('')}
      </div>
    </div>
  `;
  app.querySelectorAll('.options button').forEach(b => {
    b.onclick = () => {
      answers.push(Q.options[+b.dataset.idx].w);
      if (i + 1 < QUESTIONS.length) renderQuestion(i + 1);
      else finish();
    };
  });
}

function finish() {
  // Tally weights.
  const score = { yellow: 0, green: 0, red: 0, blue: 0 };
  answers.forEach(w => { for (const t in w) score[t] += w[t]; });

  // Rank teams by score desc, ties random.
  const ranked = [...TEAMS]
    .map(t => ({ t, s: score[t], r: Math.random() }))
    .sort((a, b) => b.s - a.s || b.r - a.r)
    .map(o => o.t);

  // First ranked team that still has space.
  const team = ranked.find(t => spots[t] > 0);

  if (!team) { renderFull(); return; }

  spots[team] -= 1;
  saveSpots();
  renderResult(team);
}

function renderResult(team) {
  setTheme(team);
  app.innerHTML = `
    <div class="hat pop">🎩</div>
    <p class="subtitle">Hatten har bestämt sig...</p>
    <div class="result-team pop">${TEAM_LABELS[team]}!</div>
    <p class="spots-left">Ta ett ${TEAM_COLOR[team]} glas och skriv ditt namn på det!</p>
    <p class="spots-left">${spots[team]} plats${spots[team] === 1 ? '' : 'er'} kvar i ditt lag</p>
    <br>
    <button id="nextBtn">Nästa person ▶</button>
  `;
  document.getElementById('nextBtn').onclick = renderStart;
}

function renderFull() {
  setTheme(null);
  app.innerHTML = `
    <div class="hat">🎩</div>
    <h1>Festen är full och snart är vi det också!</h1>
    <p class="subtitle">Alla lag är fulla. Ingen plats kvar.</p>
    <button id="backBtn">Tillbaka</button>
  `;
  document.getElementById('backBtn').onclick = renderStart;
}

// Host reset — confirm before wiping counts.
document.getElementById('resetLink').onclick = () => {
  if (confirm('Nollställ alla lag till 8 platser var?')) {
    resetSpots();
    renderStart();
  }
};

renderStart();
</script>
</body>
</html>
